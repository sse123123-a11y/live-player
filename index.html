<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:black;
}
#video{
width:100%;
height:100vh;
}
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
const video = document.getElementById('video');
const streamUrl = "https://1.syrlive.dev/en/index.m3u8";

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(streamUrl);
  hls.attachMedia(video);
} else {
  video.src = streamUrl;
}
</script>

</body>
</html>
